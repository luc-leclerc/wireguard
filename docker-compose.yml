services:
  wireguard:
    image: my-wireguard
    build: .
    ports:
      - '44444:51111/udp' # The 44444 value must match your router forwarding config, i.e. the destination port
    environment:
      # Whether to use external configuration, or auto-generated keys.
      - MY_DEMO_SERVER=true # true, false

      # Configuring the public ip and public port; used to generate client configuration QR code
      - MY_PUBLIC_FACING_IP_OR_HOST # TODO: Set your public ip or domain
      - MY_PUBLIC_FACING_PORT=44446 # This value must match your router forwarding config, i.e. the source port
      
      # Some default configs
      - MY_VPN_NETWORK=10.15.15.0/24
      - MY_WG_MTU=1420
      - MY_WG_PERSISTENT_KEEPALIVE_SECONDS=25
      - MY_WG_CLIENT_DNS=1.1.1.1, 8.8.8.8
      - MY_WG_LISTENING_PORT=51111 # Must match with ports mapping between docker container and host machine, 'see services.wireguard.ports'

      # Variables for external config setup, not relevant for demo mode, see README.md
      - MY_WG_PRIVATE_KEY
      - MY_WG_JSON_CONFIG
    cap_add:
      - NET_ADMIN # Needed to run iptables commands, otherwise: error: "iptables v1.8.10 (nf_tables): Could not fetch rule set generation id: Permission denied (you must be root)"
